<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Surfgame 3D Base</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath fill='%230e5da8' d='M8 38c12 0 12-12 24-12 8 0 13 6 24 6-6 10-17 20-32 20C15 52 10 46 8 38Z'/%3E%3Cpath fill='%23ffd166' d='M44 12a8 8 0 1 1 0 16 8 8 0 0 1 0-16Z'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260429-03" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main class="shell">
      <section class="hud">
        <div class="title-block">
          <p class="eyebrow">Prototype</p>
          <h1>Surfgame 3D Base</h1>
          <p class="lede">A lightweight surfable scene with board movement, ocean animation, camera follow, and space to build mechanics on top.</p>
        </div>
        <div class="status-card">
          <p>Speed</p>
          <strong id="speed-value">0 knots</strong>
          <span id="state-value">Idle drift</span>
          <div class="control-stack">
            <label class="control-row" for="waves-toggle">
              <span>Waves</span>
              <input id="waves-toggle" type="checkbox" checked />
            </label>
            <label class="control-field" for="board-select">
              <span>Surfboard</span>
              <select id="board-select">
                <option value="shortboard">Shortboard</option>
                <option value="fish">Fish</option>
                <option value="longboard">Longboard</option>
              </select>
            </label>
          </div>
        </div>
      </section>

      <section class="viewport-shell">
        <canvas id="scene"></canvas>
        <div class="overlay">
          <div class="pill">WASD / Arrows to steer</div>
          <div class="pill">Shift to boost</div>
          <div class="pill">Space to hop</div>
        </div>
        <div class="touch-controls" aria-label="Touch controls">
          <div class="joystick" id="touch-joystick" aria-label="Move joystick">
            <div class="joystick-ring"></div>
            <div class="joystick-thumb" id="touch-joystick-thumb"></div>
          </div>
          <button class="jump-button" id="touch-jump" type="button">Jump</button>
        </div>
      </section>
    </main>

    <script type="module" src="./src/main.js?v=20260429-03"></script>
  </body>
</html>
